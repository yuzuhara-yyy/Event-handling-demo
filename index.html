<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Event Handling Demo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">

    <h1>JavaScript Event Handling Demo</h1>

    <!-- Click Event -->
    <button id="clickBtn">Click Me</button>

    <!-- Input Event -->
    <input type="text" id="textInput" placeholder="Type something...">

    <!-- Change Event -->
    <select id="dropdown">
      <option value="">Select Option</option>
      <option value="HTML">HTML</option>
      <option value="CSS">CSS</option>
      <option value="JavaScript">JavaScript</option>
    </select>

    <!-- Form Submit -->
    <form id="myForm">
      <input type="text" id="formInput" placeholder="Submit form text">
      <button type="submit">Submit</button>
    </form>

    <!-- Keyup -->
    <p>Last key pressed: <span id="keyDisplay">None</span></p>

    <!-- Mouse events -->
    <div id="hoverBox">Hover over me</div>

    <!-- Output Area -->
    <div id="output">Output will appear here</div>

  </div>

  <script src="script.js"></script>
</body>
</html>
